<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <meta name="description" content="Get info about Minecraft servers">
    <link rel="icon" href="static/icons/Page.png">
    <link rel="stylesheet" href="static/css/stylesheet.css">
    <script async data-goatcounter="https://rumyantsev168.goatcounter.com/count" src="//gc.zgo.at/count.js"></script>
    <title>Minecraft Server Ping</title>
</head>
<body>
    <main style="max-width: fit-content">
        <header>
            <h1>Minecraft Server Ping</h1>
            <hr size="1px">
        </header>
        <p class="text-center">
            Java servers are fetched via the <a href="https://api.mcsrvstat.us">mcsrvstat.us</a> API.<br>
            WebSocket-based servers use direct connection.
        </p>
        <form class="form" id="form">
            <div>
                <label for="mcAddress">Server address</label>
                <input type="text" inputmode="url" id="address" value="mineplex.com" required>
            </div>
            <div class="form-controls">
                <div class="checkbox">
                    <input type="checkbox" id="useWS">
                    <label for="useWS">Use WebSocket</label>
                </div>
                <div class="buttons">
                    <button type="button" id="refreshBtn">Refresh</button>
                    <button type="submit" id="pingBtn">Get status</button>
                </div>
            </div>
        </form>
        <mc-server-plate id="mc-server-plate"></mc-server-plate>
        <ws-server-plate id="ws-server-plate"></ws-server-plate>
    </main>
    <script src="static/js/main.js"></script>
    <script src="static/js/minecraft/MCServerPlate.js" localassets></script>
    <script src="static/js/minecraft/WSServerPlate.js" localassets></script>
    <script>
        const form = document.getElementById("form");
        const mcPlate = document.getElementById("mc-server-plate");
        const wsPlate = document.getElementById("ws-server-plate");

        currentPlate = !form.elements.useWS.checked ? mcPlate : wsPlate;
        otherPlate = (currentPlate == mcPlate) ? wsPlate : mcPlate;
        otherPlate.style.display = "none";
        
        form.elements.useWS.onclick = () => { 
            let t = currentPlate;
            currentPlate = otherPlate;
            otherPlate = t;
            currentPlate.style.display = "inline-block";
            otherPlate.style.display = "none";
        };

        form.onsubmit = (event) => {
            event.preventDefault();
            const address = form.elements.address.value;
            if (form.elements.useWS.checked && (!address.startsWith("ws://") && !address.startsWith("wss://")) || address == "ws://" || address == "wss://") {
                alert("The address must start with ws:// or wss://!")
            }
            currentPlate.setAttribute("address", address);
        };

        form.elements.refreshBtn.onclick = () => {
            let t = currentPlate.getAttribute("address");
            if (t) {
                currentPlate.setAttribute("address", "");
                currentPlate.setAttribute("address", t);
            }
        };
    </script>
    <noscript>
        <div class="warning">
            <img src="static/icons/Warning.png" height="20">
            <p>
                Sorry, but this website won't work properly with JavaScript disabled. Please <a href="https://www.enable-javascript.com" target="_blank">enable</a> it.
            </p>
        </div>
    </noscript>
</body>
</html>
