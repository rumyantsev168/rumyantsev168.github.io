<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <meta name="description" content="Get info about Minecraft servers">
    <link rel="icon" href="static/icons/Page.png">
    <link rel="stylesheet" href="static/css/stylesheet.css">
    <!-- <link rel="stylesheet" href="static/css/custom-cursor.css"> -->
    <style>
        #input {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 5px;
            margin: 10px 0;
        }
        #mc-address {
            font-family: monospace;
            width: 100%;
        }
    </style>
    <title>Minecraft Server Ping</title>
</head>
<body>
    <main style="max-width: fit-content">
        <header>
            <h1>Minecraft Server Ping</h1>
            <hr size="1px">
        </header>
        <p class="text-center">This page uses <a href="https://api.mcsrvstat.us">https://api.mcsrvstat.us</a> API</p>
        <div id="input">
            <input id="mc-address" placeholder="Address">
            <button type="button" id="ping-btn">Ping!</button>
        </div>
        <mc-server-plate id="server-plate" displayname="test"></mc-server-plate>
    </main>
    <script src="static/js/main.js"></script>
    <script src="static/js/minecraft/MCServerPlate.js" localassets></script>
    <script>
        const mcAddress = document.getElementById("mc-address");
        const serverPlate = document.getElementById("server-plate");
        document.getElementById("ping-btn").onclick = () => {
            serverPlate.setAttribute("address", mcAddress.value);
        }
    </script>
    <noscript>
        <div class="warning">
            <img src="static/icons/Warning.png" height="5rem">
            <p>
                Sorry, but this website won't work properly with JavaScript disabled. Please <a href="https://www.enable-javascript.com" target="_blank">enable</a> it.
            </p>
        </div>
    </noscript>
</body>
</html>
