<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book with Turning Pages</title>
    <style>
        /* Base styles */
        body {
            font-family: 'Georgia', serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .book {
            width: 300px;
            height: 450px;
            perspective: 1500px;
            position: relative;
        }

        .page {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            transition: transform 1s ease-in-out;
            transform-origin: left center;
            transform-style: preserve-3d;
            background-color: #fff;
            border: 1px solid #ccc;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            backface-visibility: hidden; /* Important for correct flipping */
        }

        .page-content {
            padding: 20px;
            height: 100%;
            backface-visibility: hidden;
            background-color: #fff;
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .page-front {
            background-color: #fff;
        }

        .page-back {
            background-color: #eee;
            transform: rotateY(180deg);
            backface-visibility: hidden;
        }

        /* Initial state: pages are stacked flat */
        .page {
            transform: rotateY(0deg);
        }

        /* Page turned class */
        .page.flipped {
            transform: rotateY(-180deg);
        }

        /* Controls */
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Styling content for demo */
        .page h1 {
            text-align: center;
        }

        .page p {
            text-align: justify;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="book" id="book">
    <!-- Page 1: Cover -->
    <div class="page" id="page1">
        <div class="page-front">
            <h1>The Book</h1>
            <p>Front Cover</p>
        </div>
        <div class="page-back">
            <h1>Page 1</h1>
            <p>Welcome to the book.</p>
        </div>
    </div>

    <!-- Page 2 -->
    <div class="page" id="page2">
        <div class="page-front">
            <h1>Chapter 1</h1>
            <p>It was a dark and stormy night...</p>
        </div>
        <div class="page-back">
            <h1>Page 2</h1>
            <p>The rain poured relentlessly.</p>
        </div>
    </div>

    <!-- Page 3: Back Cover -->
    <div class="page" id="page3">
        <div class="page-front">
            <h1>Chapter 2</h1>
            <p>The storm finally broke at dawn.</p>
        </div>
        <div class="page-back">
            <h1>Back Cover</h1>
            <p>Thank you for reading!</p>
        </div>
    </div>
</div>

<div class="controls">
    <button id="btn-prev">Previous</button>
    <button id="btn-next">Next</button>
</div>
