<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
    <meta name="description" content="Get info about Minecraft servers via WebSocket">
    <link rel="icon" href="static/icons/Page.png">
    <link rel="stylesheet" href="static/css/stylesheet.css">
    <script async data-goatcounter="https://rumyantsev168.goatcounter.com/count" src="//gc.zgo.at/count.js"></script>
    <style>
        #input {
            display: flex;
            align-items: center;
            width: 100%;
            gap: 5px;
            margin: 10px 0;
        }
        #ws-address {
            font-family: monospace;
            width: 100%;
        }
    </style>
    <title>Minecraft Server Ping via WebSocket</title>
</head>
<body>
    <main style="max-width: fit-content">
        <header>
            <h1>Minecraft Server Ping</h1>
            <hr size="1px">
        </header>
        <p class="text-center">
            This page uses WebSocket<br>
            <small><i>This page is now entirely replaced by <a href="mcservers.html">Minecraft Server Ping</a></i></small>
        </p>
        <div id="input">
            <input type="url" id="ws-address" placeholder="WebSocket Address" value="wss://">
            <button type="button" id="ping-btn">Ping!</button>
        </div>
        <ws-server-plate id="server-plate"></ws-server-plate>
    </main>
    <script src="static/js/main.js"></script>
    <script src="static/js/minecraft/WSServerPlate.js" localassets></script>
    <script>
        const wsAddress = document.getElementById("ws-address");
        const serverPlate = document.getElementById("server-plate");
        document.getElementById("ping-btn").onclick = () => {
            serverPlate.setAttribute("address", wsAddress.value);
        }
    </script>
    <noscript>
        <div class="warning">
            <img src="static/icons/Warning.png" height="20">
            <p>
                Sorry, but this website won't work properly with JavaScript disabled. Please <a href="https://www.enable-javascript.com" target="_blank">enable</a> it.
            </p>
        </div>
    </noscript>
</body>
</html>
